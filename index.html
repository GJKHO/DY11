<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Bus Driving</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style type="text/css">
        * {
            padding: 0;
            margin: 0;
        }
        /* xyx-sdk 需要基于这个来获取 safe area 值 */
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }
        html,
        body {
            background: #000;
            color: #fff;
            overflow: hidden;
            touch-action: none;
            -ms-touch-action: none;
            width: 100%;
            height: 100%;
        }
        canvas {
            outline: none;
        }
        #version {
            position: absolute;
            top: 0;
            left: 0;
            color: #fff;
            font-size: 12px;
            pointer-events: none;
            line-height: 1.5;
            padding-left: 4px;
            opacity: 0.5;
            text-align: left;
            z-index: 50;
            text-shadow: 1px 1px 1px #565656;
        }

        /* ===== Adsgram Ad Layer ===== */
        #tg-ad-layer {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            pointer-events: none;
        }
        #tg-reward-btn {
            pointer-events: auto;
            font-size: 15px;
            padding: 10px 18px;
            background: linear-gradient(135deg, #00b4d8, #0096c7);
            color: #fff;
            border: none;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.5);
            cursor: pointer;
            display: none;
        }
        #tg-reward-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #tg-score-toast {
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 8px #000;
            display: none;
            animation: floatUp 1.2s ease forwards;
        }
        @keyframes floatUp {
            0%   { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>
<body>
    <div id="version">V0.0.0</div>
    <canvas></canvas>
    <script>
      window.XYX_GAME_INDEX_ORIGIN = location.origin;
    </script>
    <!-- AutoStart -->
<script type="text/javascript" src="./output/1.js.js?v=1713325837376"></script>
<script type="text/javascript" src="./output/2.js.js?v=1713325837376"></script>
<script type="text/javascript" src="./output/3.js.js?v=1713325837376"></script>

<script type="text/javascript" src="./output/main-5f01b890.js?v=1713325837376"></script>
<script type="text/javascript" src="./output/main-880f3311.js?v=1713325837376"></script>
<script type="text/javascript" src="./output/main-d91a9049.js?v=1713325837376"></script>
<!-- AutoFinish -->
    <script>
    document.addEventListener(
      'DOMContentLoaded',
      function () {
        xyx.triggerReady();
          const domVersion = document.getElementById('version');
          if (domVersion) domVersion.textContent = `V${XYX_GAME_VERSION}`;
      },
      false
    );
    </script>

    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <!-- Adsgram Ad Layer -->
    <div id="tg-ad-layer">
        <div id="tg-score-toast">+200 pts</div>
        <button id="tg-reward-btn" onclick="tgShowRewardAd()">📺 Watch Ad +200 pts</button>
    </div>

    <script>
    (function () {
        // Telegram SDK 初始化
        window.Telegram && window.Telegram.WebApp && (
            window.Telegram.WebApp.ready(),
            window.Telegram.WebApp.expand()
        );

        var AdController = null;
        var IntAdController = null;

        // 从 ID.txt 读取广告 Block ID，格式：KEY=VALUE，每行一条
        function loadConfig(cb) {
            fetch('ID.txt?_=' + Date.now())
                .then(function (r) { return r.text(); })
                .then(function (text) {
                    var cfg = {};
                    text.split('\n').forEach(function (line) {
                        var parts = line.trim().split('=');
                        if (parts.length === 2) cfg[parts[0].trim()] = parts[1].trim();
                    });
                    cb(cfg);
                })
                .catch(function () { cb({}); });
        }

        function initAds(cfg) {
            if (!window.Adsgram) return;
            var rewardId = cfg['REWARD_BLOCK_ID'] || '';
            var intId    = cfg['INT_BLOCK_ID']    || '';
            try { if (rewardId) AdController    = window.Adsgram.init({ blockId: rewardId }); } catch(e) {}
            try { if (intId)    IntAdController = window.Adsgram.init({ blockId: intId });    } catch(e) {}

            document.getElementById('tg-reward-btn').style.display = 'block';
            startIntAdTimer();
        }

        function waitAndInit(cfg) {
            if (window.Adsgram) {
                initAds(cfg);
            } else {
                var sdkCheck = setInterval(function () {
                    if (window.Adsgram) { clearInterval(sdkCheck); initAds(cfg); }
                }, 300);
            }
        }

        // 先加载配置，再初始化广告
        loadConfig(function (cfg) {
            waitAndInit(cfg);
        });

        // 激励广告：看完后 +200 分
        window.tgShowRewardAd = function () {
            if (!AdController) return;
            var btn = document.getElementById('tg-reward-btn');
            btn.disabled = true;
            AdController.show().then(function () {
                // 通知游戏加分（游戏脚本可覆盖此函数实现真实加分）
                if (typeof window.onAdsgramReward === 'function') {
                    window.onAdsgramReward(200);
                }
                // 浮动提示
                var toast = document.getElementById('tg-score-toast');
                toast.style.display = 'block';
                toast.style.animation = 'none';
                setTimeout(function () {
                    toast.style.animation = 'floatUp 1.2s ease forwards';
                    setTimeout(function () { toast.style.display = 'none'; }, 1200);
                }, 20);
                // 60 秒冷却
                var cd = 60;
                btn.textContent = '⏳ ' + cd + 's';
                var cdTimer = setInterval(function () {
                    cd--;
                    if (cd <= 0) {
                        clearInterval(cdTimer);
                        btn.disabled = false;
                        btn.textContent = '📺 Watch Ad +200 pts';
                    } else {
                        btn.textContent = '⏳ ' + cd + 's';
                    }
                }, 1000);
            }).catch(function () {
                btn.disabled = false;
            });
        };

        // 插屏广告：每 30 秒自动弹出
        var intAdInterval = null;
        function startIntAdTimer() {
            intAdInterval = setInterval(function () {
                if (!IntAdController) return;
                IntAdController.show().then(function () {}).catch(function () {});
            }, 30000);
        }
    })();
    </script>

</body>
</html>
